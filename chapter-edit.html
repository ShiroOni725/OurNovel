<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Chapter - NovelKita</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .edit-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .edit-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 32px;
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 14px;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
        }

        .chapter-editor {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 16px;
            line-height: 1.8;
            resize: vertical;
            min-height: 400px;
            transition: var(--transition);
        }

        .chapter-editor:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 4px 8px;
            border-radius: var(--radius);
            transition: var(--transition);
        }

        .back-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .novel-badge {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .word-count {
            font-size: 12px;
            color: var(--text-muted);
            text-align: right;
            margin-top: 6px;
        }

        .chapter-list-section {
            margin-top: 32px;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 24px;
            border: 1px solid var(--border);
        }

        .chapter-list-section h3 {
            margin-bottom: 16px;
        }

        .chapter-item-manage {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .chapter-item-manage:hover {
            background: var(--bg-primary);
        }

        .chapter-item-manage:last-child {
            border-bottom: none;
        }

        .chapter-item-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: none;
            border: none;
            padding: 6px 10px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .icon-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .icon-btn.danger:hover {
            background: #fee2e2;
            color: #dc2626;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo" onclick="window.location.href='home.html'">NovelKita</div>
            <div class="nav-links" id="navLinks"></div>
            <button class="menu-toggle" id="menuToggle">menu</button>
        </div>
    </nav>

    <main class="container">
        <div class="edit-container">
            <div class="page-header">
                <button class="back-btn" onclick="goBack()">&#8592;</button>
                <h1 id="pageTitle">Tambah Chapter</h1>
            </div>

            <div class="novel-badge" id="novelBadge"></div>

            <div class="edit-card">
                <form id="chapterForm">
                    <div class="form-group">
                        <label>Judul Chapter</label>
                        <input type="text" id="chapterTitle" placeholder="contoh: Bab 1: Awal Mula" required>
                    </div>
                    <div class="form-group">
                        <label>Konten</label>
                        <textarea class="chapter-editor" id="chapterContent" placeholder="Tulis isi chapter di sini..."></textarea>
                        <div class="word-count" id="wordCount">0 kata</div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="saveBtn">Simpan Chapter</button>
                        <button type="button" class="btn-secondary" onclick="goBack()">Batal</button>
                    </div>
                </form>
            </div>

            <div class="chapter-list-section" id="chapterListSection" style="display:none;">
                <h3>Chapter yang Ada</h3>
                <div id="chapterListContainer"></div>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="mock-data.js"></script>
    <script src="utils.js"></script>
    <script src="theme.js"></script>
    <script src="auth.js"></script>
    <script src="chapter-edit.js"></script>
</body>
</html>
