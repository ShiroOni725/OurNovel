<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - NovelKita</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo" onclick="window.location.href='home.html'">📚 NovelKita</div>
            <div class="nav-links" id="navLinks"></div>
            <button class="menu-toggle" id="menuToggle">☰</button>
        </div>
    </nav>

    <main class="container">
        <div class="search-section">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Cari novel atau penulis..." class="search-input">
                <select id="genreFilter" class="genre-select">
                    <option value="all">📚 Semua Genre</option>
                    <option value="Fantasi">🧙 Fantasi</option>
                    <option value="Roman">💕 Roman</option>
                    <option value="Misteri">🕵️ Misteri</option>
                    <option value="Horor">👻 Horor</option>
                    <option value="Komedi">😂 Komedi</option>
                    <option value="Petualangan">🗺️ Petualangan</option>
                    <option value="Sci-Fi">🚀 Sci-Fi</option>
                </select>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="latest">✨ Terbaru</button>
                <button class="tab-btn" data-tab="popular">🔥 Terpopuler</button>
                <button class="tab-btn" data-tab="top">⭐ Rating Tertinggi</button>
            </div>
        </div>

        <div class="novels-grid" id="novelsGrid"></div>
    </main>

    <div id="toast-container"></div>

    <script src="mock-data.js"></script>
    <script src="utils.js"></script>
    <script src="theme.js"></script>
    <script src="auth.js"></script>
    <script src="home.js"></script>
</body>
</html>
