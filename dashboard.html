<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - NovelKita</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border);
        }
        
        .stat-card-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
        }
        
        .stat-card-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 8px;
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .novel-table {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border);
        }
        
        .novel-row {
            display: grid;
            grid-template-columns: 60px 1fr 100px 100px 100px 120px;
            gap: 12px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            align-items: center;
        }
        
        .novel-header {
            background: var(--bg-tertiary);
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        .novel-status {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            width: fit-content;
        }
        
        .status-published {
            background: var(--success);
            color: white;
        }
        
        .status-draft {
            background: var(--warning);
            color: white;
        }
        
        .status-completed {
            background: var(--primary);
            color: white;
        }
        
        .novel-actions {
            display: flex;
            gap: 8px;
        }
        
        .action-icon {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: var(--radius);
            transition: var(--transition);
        }
        
        .action-icon:hover {
            background: var(--bg-primary);
        }
        
        @media (max-width: 768px) {
            .dashboard-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .novel-row {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            
            .novel-header {
                display: none;
            }
            
            .novel-actions {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo" onclick="window.location.href='home.html'">📚 NovelKita</div>
            <div class="nav-links" id="navLinks"></div>
            <button class="menu-toggle" id="menuToggle">☰</button>
        </div>
    </nav>

    <main class="container">
        <div class="dashboard-header">
            <h1>📊 Dashboard Penulis</h1>
            <button class="btn-primary" onclick="window.location.href='novel-edit.html?new=true'">
                + Novel Baru
            </button>
        </div>
        
        <div class="dashboard-stats" id="dashboardStats"></div>
        
        <h2 style="margin-bottom: 16px;">📖 Novel Saya</h2>
        <div class="novel-table">
            <div class="novel-row novel-header">
                <div>#</div>
                <div>Judul</div>
                <div>Genre</div>
                <div>Status</div>
                <div>Views</div>
                <div>Aksi</div>
            </div>
            <div id="novelsList"></div>
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="mock-data.js"></script>
    <script src="utils.js"></script>
    <script src="theme.js"></script>
    <script src="auth.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
