<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Novel - NovelKita</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Additional styles for novel detail */
        .novel-detail-header {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 32px;
            margin-bottom: 32px;
        }
        
        .novel-detail-cover {
            width: 200px;
            height: 280px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            margin-right: 32px;
            float: left;
        }
        
        .novel-detail-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 12px;
        }
        
        .novel-detail-author {
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 16px;
            cursor: pointer;
        }
        
        .novel-detail-stats {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
            padding: 16px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            display: block;
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .novel-detail-desc {
            line-height: 1.8;
            margin-bottom: 24px;
            color: var(--text-secondary);
        }
        
        .novel-genre-badge {
            display: inline-block;
            background: var(--primary-light);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .chapter-list {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 24px;
        }
        
        .chapter-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .chapter-item:hover {
            background: var(--bg-primary);
        }
        
        .chapter-title {
            font-weight: 500;
        }
        
        .chapter-views {
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .rating-section {
            margin-top: 32px;
            padding: 24px;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
        }
        
        .stars {
            display: flex;
            gap: 8px;
            margin: 16px 0;
        }
        
        .star {
            font-size: 32px;
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s;
        }
        
        .star.active {
            color: #fbbf24;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }
        
        @media (max-width: 768px) {
            .novel-detail-cover {
                float: none;
                margin: 0 auto 24px;
            }
            
            .novel-detail-stats {
                justify-content: space-around;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">📚 NovelKita</div>
            <div class="nav-links" id="navLinks"></div>
            <button class="menu-toggle">☰</button>
        </div>
    </nav>

    <main class="container" id="mainContent">
        <div id="novelDetail"></div>
    </main>

    <script src="mock-data.js"></script>
    <script src="utils.js"></script>
    <script src="theme.js"></script>
    <script src="auth.js"></script>
    <div id="toast-container"></div>
    <script src="novel-detail.js"></script>
</body>
</html>
