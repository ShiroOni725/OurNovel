<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Novel - NovelKita</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .edit-container {
            max-width: 700px;
            margin: 0 auto;
        }

        .edit-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 32px;
            border: 1px solid var(--border);
        }

        .edit-card h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 14px;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .status-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .status-option {
            display: none;
        }

        .status-label {
            padding: 10px 20px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: var(--transition);
        }

        .status-option:checked + .status-label {
            border-color: var(--primary);
            background: var(--primary-bg);
            color: var(--primary);
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 4px 8px;
            border-radius: var(--radius);
            transition: var(--transition);
        }

        .back-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo" onclick="window.location.href='home.html'">NovelKita</div>
            <div class="nav-links" id="navLinks"></div>
            <button class="menu-toggle" id="menuToggle">menu</button>
        </div>
    </nav>

    <main class="container">
        <div class="edit-container">
            <div class="page-header">
                <button class="back-btn" onclick="history.back()">&#8592;</button>
                <h1 id="pageTitle">Novel Baru</h1>
            </div>

            <div class="edit-card">
                <form id="novelForm">
                    <div class="form-group">
                        <label>Judul Novel</label>
                        <input type="text" id="novelTitle" placeholder="Masukkan judul novel..." required>
                    </div>
                    <div class="form-group">
                        <label>Genre</label>
                        <select id="novelGenre" required>
                            <option value="">Pilih Genre</option>
                            <option value="Fantasi">Fantasi</option>
                            <option value="Roman">Roman</option>
                            <option value="Misteri">Misteri</option>
                            <option value="Horor">Horor</option>
                            <option value="Komedi">Komedi</option>
                            <option value="Petualangan">Petualangan</option>
                            <option value="Sci-Fi">Sci-Fi</option>
                            <option value="Drama">Drama</option>
                            <option value="Thriller">Thriller</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Deskripsi</label>
                        <textarea id="novelDesc" placeholder="Ceritakan sinopsis novelmu..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <div class="status-group">
                            <input type="radio" name="novelStatus" id="statusDraft" value="draft" class="status-option" checked>
                            <label for="statusDraft" class="status-label">Draft</label>

                            <input type="radio" name="novelStatus" id="statusPublished" value="published" class="status-option">
                            <label for="statusPublished" class="status-label">Published</label>

                            <input type="radio" name="novelStatus" id="statusCompleted" value="completed" class="status-option">
                            <label for="statusCompleted" class="status-label">Completed</label>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="saveBtn">Simpan Novel</button>
                        <button type="button" class="btn-secondary" onclick="history.back()">Batal</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="mock-data.js"></script>
    <script src="utils.js"></script>
    <script src="theme.js"></script>
    <script src="auth.js"></script>
    <script src="novel-edit.js"></script>
</body>
</html>
